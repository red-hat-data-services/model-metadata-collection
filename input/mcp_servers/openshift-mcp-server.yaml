name: openshift-mcp-server
provider: Red Hat
license: apache-2.0
license_link: https://www.apache.org/licenses/LICENSE-2.0
description: MCP server for Red Hat OpenShift and Kubernetes cluster management. Allows agents to inspect pods, workloads, nodes, and cluster resources, view logs and events, and browse configuration using direct Kubernetes API access. Tools listed below reflect the default read-only configuration with core and config toolsets enabled.
readme: |-
    # MCP Server for Red Hat OpenShift

    **MCP Server Summary:**
    Access OpenShift and Kubernetes clusters through natural language using a
    native Go implementation that directly interacts with the Kubernetes API server.

    ## Features
    - List, inspect, and query pods, deployments, nodes, and other resources
    - Retrieve pod and node logs with filtering
    - Monitor cluster events and resource metrics (CPU/memory via Metrics Server)
    - Browse namespaces, projects, and cluster configuration
    - Optional Helm chart management
    - Multi-cluster support with automatic kubeconfig detection
    - Read-only and disable-destructive modes for safe operation

    ## Prerequisites
    - Access to an OpenShift or Kubernetes cluster
    - ServiceAccount with appropriate RBAC permissions

    ## Configuration
    The server can be configured via TOML file or command-line flags.
    Default toolsets: `core`, `config` (with `read_only: true`).
    Additional toolsets: `helm`, `kubevirt`, `observability`, `ossm`, `netedge` (OCP).

    The tools listed below reflect the default configuration. The actual set of
    available tools depends on configuration — toolsets can be enabled or disabled,
    and individual tools within a toolset can be filtered using allow/deny lists.
    See [Tool Filtering](https://github.com/openshift/openshift-mcp-server/blob/release-0.2.0/docs/configuration.md#tool-filtering) for details.
version: latest
transports:
    - http
    - sse
logo: data:image/svg+xml;base64,
documentationUrl: https://docs.redhat.com/en/documentation/openshift_container_platform
repositoryUrl: https://github.com/openshift/openshift-mcp-server
sourceCode: openshift/openshift-mcp-server
publishedDate: "2025-07-23T00:00:00Z"
tools:
    - name: pods_list
      description: List all pods across namespaces or filtered by label/field selectors
      accessType: read_only
      parameters:
        - name: labelSelector
          type: string
          description: Label selector to filter pods
          required: false
        - name: fieldSelector
          type: string
          description: Field selector to filter pods
          required: false
    - name: pods_get
      description: Get detailed information about a specific pod
      accessType: read_only
      parameters:
        - name: namespace
          type: string
          description: Kubernetes namespace
          required: false
        - name: name
          type: string
          description: Name of the pod
          required: true
    - name: pods_log
      description: Retrieve logs from a pod
      accessType: read_only
      parameters:
        - name: namespace
          type: string
          description: Kubernetes namespace
          required: false
        - name: name
          type: string
          description: Name of the pod
          required: true
        - name: container
          type: string
          description: Container name (optional if pod has only one container)
          required: false
        - name: tail
          type: integer
          description: Number of lines to return from the end of the log (default 100)
          required: false
        - name: previous
          type: boolean
          description: Return logs from the previous container instance
          required: false
    - name: pods_list_in_namespace
      description: List pods in a specific namespace
      accessType: read_only
      parameters:
        - name: namespace
          type: string
          description: Kubernetes namespace
          required: true
        - name: labelSelector
          type: string
          description: Label selector to filter pods
          required: false
        - name: fieldSelector
          type: string
          description: Field selector to filter pods
          required: false
    - name: pods_top
      description: Pod CPU and memory usage via Metrics Server
      accessType: read_only
      parameters:
        - name: all_namespaces
          type: boolean
          description: Show metrics across all namespaces (default true)
          required: false
        - name: namespace
          type: string
          description: Kubernetes namespace
          required: false
        - name: name
          type: string
          description: Name of a specific pod
          required: false
        - name: label_selector
          type: string
          description: Label selector to filter pods
          required: false
    - name: namespaces_list
      description: List all namespaces in the cluster
      accessType: read_only
      parameters: []
    - name: projects_list
      description: List OpenShift projects (OpenShift clusters only)
      accessType: read_only
      parameters: []
    - name: nodes_log
      description: Get kubelet and system logs from a node
      accessType: read_only
      parameters:
        - name: name
          type: string
          description: Name of the node
          required: true
        - name: query
          type: string
          description: Log query filter
          required: true
        - name: tailLines
          type: integer
          description: Number of lines to return from the end (default 100)
          required: false
    - name: nodes_stats_summary
      description: Detailed node resource usage stats from kubelet Summary API
      accessType: read_only
      parameters:
        - name: name
          type: string
          description: Name of the node
          required: true
    - name: nodes_top
      description: Node CPU and memory usage via Metrics Server
      accessType: read_only
      parameters:
        - name: name
          type: string
          description: Name of a specific node
          required: false
        - name: label_selector
          type: string
          description: Label selector to filter nodes
          required: false
    - name: events_list
      description: List cluster events in a namespace or across all namespaces
      accessType: read_only
      parameters:
        - name: namespace
          type: string
          description: Kubernetes namespace (omit for all namespaces)
          required: false
    - name: resources_get
      description: Get a specific Kubernetes resource by apiVersion, kind, and name
      accessType: read_only
      parameters:
        - name: apiVersion
          type: string
          description: API version of the resource (e.g. apps/v1)
          required: true
        - name: kind
          type: string
          description: Kind of the resource (e.g. Deployment)
          required: true
        - name: namespace
          type: string
          description: Kubernetes namespace (omit for cluster-scoped resources)
          required: false
        - name: name
          type: string
          description: Name of the resource
          required: true
    - name: resources_list
      description: List Kubernetes resources by apiVersion and kind
      accessType: read_only
      parameters:
        - name: apiVersion
          type: string
          description: API version of the resource (e.g. apps/v1)
          required: true
        - name: kind
          type: string
          description: Kind of the resource (e.g. Deployment)
          required: true
        - name: namespace
          type: string
          description: Kubernetes namespace (omit for cluster-scoped resources)
          required: false
        - name: labelSelector
          type: string
          description: Label selector to filter resources
          required: false
        - name: fieldSelector
          type: string
          description: Field selector to filter resources
          required: false
    - name: configuration_view
      description: View the current kubeconfig configuration
      accessType: read_only
      parameters:
        - name: minified
          type: boolean
          description: Return current context only (true) or all contexts (false)
          required: false
    - name: configuration_contexts_list
      description: List kubeconfig context names and server URLs
      accessType: read_only
      parameters: []
artifacts:
    - uri: oci://quay.io/redhat-user-workloads/crt-nshift-lightspeed-tenant/openshift-mcp-server:latest
      createTimeSinceEpoch: "1775563963000"
      lastUpdateTimeSinceEpoch: "1775563964000"
runtimeMetadata:
    defaultArgs:
        - --config
        - /etc/mcp-config/config.toml
    defaultPort: 8080
    mcpPath: /mcp
    prerequisites:
        configMaps:
            - description: Optional configuration for MCP server settings
              keys:
                - defaultContent: |
                    log_level = 5
                    port = "8080"
                    read_only = true
                    toolsets = ["core", "config"]
                  description: Server configuration file
                  key: config.toml
                  required: false
              mountAsFile: true
              mountPath: /etc/mcp-config
              name: openshift-mcp-server-config
        serviceAccount:
            hint: Needs 'view' ClusterRole for read-only cluster access
            required: true
            suggestedName: mcp-viewer
securityIndicators:
    readOnlyTools: true
    sast: true
    secureEndpoint: true
    verifiedSource: true
customProperties:
    architecture:
        metadataType: MetadataStringValue
        string_value: "[\"amd64\",\"arm64\"]"
    containers:
        metadataType: MetadataStringValue
        string_value: ""
    infrastructure:
        metadataType: MetadataStringValue
        string_value: ""
    kubernetes:
        metadataType: MetadataStringValue
        string_value: ""
    openshift:
        metadataType: MetadataStringValue
        string_value: ""
