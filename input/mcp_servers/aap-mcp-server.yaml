name: aap-mcp-server
provider: Red Hat
license: apache-2.0
license_link: https://www.apache.org/licenses/LICENSE-2.0
description: Ansible Automation Platform MCP server providing AI agent access to AAP APIs through OpenAPI specifications. Supports controller, galaxy, gateway, and EDA services with role-based toolsets, session management with token validation, and optional Prometheus metrics. Write operations disabled by default. Tools listed below are a representative subset; the server exposes 62+ tools in read-only mode and 101+ with write operations enabled.
readme: |-
    # Ansible Automation Platform MCP Server

    **MCP Server Summary:**
    Connect AI agents to your Ansible Automation Platform instance through
    dynamically generated tools derived from AAP OpenAPI specifications.

    ## Services
    - **Controller** — Job templates, workflow jobs, inventories, hosts, groups, projects, organizations
    - **Galaxy** — Collection discovery and version management
    - **Gateway** — User, team, and organization administration, activity streams
    - **EDA** — Event-Driven Ansible activations, rulebooks, decision environments

    ## Features
    - Dynamic tool generation from OpenAPI specs for each AAP service
    - Role-based toolsets for permission-based tool filtering
    - Session management with token validation
    - Prometheus metrics for monitoring (opt-in)
    - Health check endpoint at `/api/v1/health`
    - Write operations controlled via `ALLOW_WRITE_OPERATIONS` (disabled by default)

    ## Prerequisites
    - Running Ansible Automation Platform instance
    - OAuth2 bearer token with appropriate permissions (authentication is per-session via HTTP Authorization header)

    ### Kubernetes/OpenShift Deployment
    - Kubernetes secret `aap-credentials` with `base-url` and `token` keys

    ```bash
    kubectl create secret generic aap-credentials \
      --from-literal=base-url=https://your-aap-instance.example.com \
      --from-literal=token=your-oauth2-bearer-token
    ```
version: 1.0.0
transports:
    - http
    - sse
logo: data:image/svg+xml;base64,
documentationUrl: https://docs.redhat.com/en/documentation/red_hat_ansible_automation_platform/2.6/html/containerized_installation/deploying-ansible-mcp-server
repositoryUrl: https://github.com/ansible/aap-mcp-server
sourceCode: ansible/aap-mcp-server
publishedDate: "2026-02-02T00:00:00Z"
tools:
    - name: controller.job_templates_launch_create
      description: Launch an Ansible job template
      accessType: read_write
      parameters: []
    - name: controller.workflow_job_templates_launch_create
      description: Launch an Ansible workflow job template
      accessType: read_write
      parameters: []
    - name: controller.jobs_retrieve
      description: Retrieve the status and details of a job
      accessType: read_only
      parameters: []
    - name: controller.workflow_jobs_retrieve
      description: Retrieve the status and details of a workflow job
      accessType: read_only
      parameters: []
    - name: controller.inventories_list
      description: List available inventories in Ansible Automation Platform
      accessType: read_only
      parameters: []
    - name: controller.hosts_list
      description: List hosts in an inventory
      accessType: read_only
      parameters: []
    - name: controller.groups_list
      description: List groups in an inventory
      accessType: read_only
      parameters: []
    - name: controller.config_retrieve
      description: Retrieve AAP controller configuration
      accessType: read_only
      parameters: []
    - name: gateway.activitystream_list
      description: List activity stream events from the AAP gateway
      accessType: read_only
      parameters: []
artifacts:
    - uri: oci://registry.redhat.io/ansible-automation-platform-tech-preview/mcp-server-rhel9:latest
      createTimeSinceEpoch: "1774268095000"
      lastUpdateTimeSinceEpoch: "1774268097000"
runtimeMetadata:
    defaultPort: 3000
    mcpPath: /mcp
    prerequisites:
        environmentVariables:
            - description: AAP instance URL (from secret aap-credentials)
              name: BASE_URL
              required: true
              type: string
            - description: OAuth2 bearer token for Kubernetes/OpenShift deployment orchestration (injected from secret aap-credentials; not consumed directly by the server runtime — authentication is per-session via HTTP Authorization header)
              name: BEARER_TOKEN_OAUTH2_AUTHENTICATION
              required: false
              type: string
            - description: Server port override (default 3000)
              name: MCP_PORT
              required: false
              type: string
            - description: Enable Prometheus metrics export at /metrics
              name: ENABLE_METRICS
              required: false
              type: string
            - description: Enable write operations (disabled by default)
              name: ALLOW_WRITE_OPERATIONS
              required: false
              type: string
            - description: Bypass TLS certificate validation for self-signed certificates
              name: IGNORE_CERTIFICATE_ERRORS
              required: false
              type: string
            - description: Session timeout in seconds (default 1200)
              name: SESSION_TIMEOUT
              required: false
              type: string
        secrets:
            - description: kubectl create secret generic aap-credentials --from-literal=base-url=https://your-aap-instance.com --from-literal=token=your-oauth2-bearer-token
              keys:
                - description: AAP instance URL
                  envVarName: BASE_URL
                  key: base-url
                  required: true
                - description: OAuth2 bearer token for AAP Gateway API authentication
                  envVarName: BEARER_TOKEN_OAUTH2_AUTHENTICATION
                  key: token
                  required: true
              mountAsFile: false
              name: aap-credentials
securityIndicators:
    readOnlyTools: true
    sast: true
    secureEndpoint: true
    verifiedSource: true
customProperties:
    ansible:
        metadataType: MetadataStringValue
        string_value: ""
    architecture:
        metadataType: MetadataStringValue
        string_value: "[\"amd64\",\"arm64\",\"ppc64le\",\"s390x\"]"
    automation:
        metadataType: MetadataStringValue
        string_value: ""
    infrastructure:
        metadataType: MetadataStringValue
        string_value: ""
createTimeSinceEpoch: "1769990400000"
lastUpdateTimeSinceEpoch: "1774268097000"
