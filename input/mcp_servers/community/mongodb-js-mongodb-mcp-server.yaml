name: mongodb-js/mongodb-mcp-server
provider: MongoDB
license: Apache-2.0
license_link: https://www.apache.org/licenses/LICENSE-2.0
description: Interact with MongoDB databases and MongoDB Atlas. Provides database operations, Atlas cluster management, performance analysis, and query execution capabilities.
readme: |-
    # MongoDB MCP Server

    A Model Context Protocol server for interacting with MongoDB databases
    and MongoDB Atlas. Enables AI assistants to perform database operations,
    manage Atlas clusters, analyze performance, and execute queries.

    ## Features
    - **Database Operations** — Query, aggregate, and manage MongoDB collections with configurable read-only mode
    - **Schema Intelligence** — Infer collection schemas, inspect indexes, and analyze storage
    - **Atlas Integration** — Manage Atlas clusters, projects, and users via Atlas API Service Accounts
    - **Knowledge Sources** — Search MongoDB documentation and knowledge bases
    - **Multiple Transports** — Supports stdio and HTTP transports
    - **Safety Controls** — Read-only mode, index enforcement, and confirmation-required tools

    ## Tools
    - find, aggregate, count — Query and analyze collection data
    - list-databases, list-collections — Enumerate database resources
    - collection-schema, collection-indexes — Schema and index inspection
    - collection-storage-size, db-stats — Storage and performance metrics
    - connect — Establish MongoDB connections
    - explain — Query execution plan analysis
    - export — Export collection data
    - mongodb-logs — Server log retrieval
    - list-knowledge-sources, search-knowledge — Documentation search

    ## Authentication
    Connects via MongoDB connection string (MDB_MCP_CONNECTION_STRING)
    or Atlas API Service Account credentials (MDB_MCP_API_CLIENT_ID,
    MDB_MCP_API_CLIENT_SECRET). The server will not start unless at
    least one authentication method is configured.

    ## Prerequisites
    - Node.js 20.19.0+ (or v22.12.0+, or 23+) or Docker
    - MongoDB connection string or Atlas API credentials
    - Optional: Atlas Service Account for cluster management tools

    ## Quick Start
    ```bash
    npx -y mongodb-mcp-server@latest --readOnly
    ```

    ## Transports
    Supports stdio (default) and HTTP transports. HTTP mode configurable
    via MDB_MCP_HTTP_HOST, MDB_MCP_HTTP_PORT environment variables.
version: 1.0.0
transports:
    - stdio
    - http
logo: data:image/png;base64,
documentationUrl: https://www.mongodb.com/docs/mcp-server/get-started/
repositoryUrl: https://github.com/mongodb-js/mongodb-mcp-server
deploymentMode: local
tags:
    - mongodb
    - nosql
    - database
    - atlas
    - document-database
    - aggregation
    - query
tools:
    - name: find
      description: Run a find query against a MongoDB collection
      accessType: read_only
      parameters: []
    - name: aggregate
      description: Run an aggregation against a MongoDB collection
      accessType: read_only
      parameters: []
    - name: list-databases
      description: List all databases for a MongoDB connection
      accessType: read_only
      parameters: []
    - name: list-collections
      description: List all collections for a given database
      accessType: read_only
      parameters: []
    - name: collection-schema
      description: Describe the schema for a collection
      accessType: read_only
      parameters: []
    - name: collection-indexes
      description: Describe the indexes for a collection
      accessType: read_only
      parameters: []
    - name: collection-storage-size
      description: Get storage size information for a collection
      accessType: read_only
      parameters: []
    - name: connect
      description: Establish connection to MongoDB instance
      accessType: read_only
      parameters: []
    - name: count
      description: Count documents in a collection
      accessType: read_only
      parameters: []
    - name: db-stats
      description: Retrieve database statistics
      accessType: read_only
      parameters: []
    - name: explain
      description: Explain query execution plan
      accessType: read_only
      parameters: []
    - name: export
      description: Export data from MongoDB collection
      accessType: read_only
      parameters: []
    - name: mongodb-logs
      description: Retrieve MongoDB server logs
      accessType: read_only
      parameters: []
    - name: list-knowledge-sources
      description: List available knowledge sources
      accessType: read_only
      parameters: []
    - name: search-knowledge
      description: Search across knowledge sources
      accessType: read_only
      parameters: []
artifacts:
    - uri: oci://quay.io/rhoai-partner-mcp/ubi10-mongodb-mcp-server:1774027206
      createTimeSinceEpoch: "1774027075000"
      lastUpdateTimeSinceEpoch: "1774027075000"
runtimeMetadata:
    defaultArgs:
        - --transport
        - http
        - --httpHost
        - 0.0.0.0
        - --httpPort
        - "9002"
        - --readOnly
    defaultPort: 9002
    optionalEnvironmentVariables:
        - description: MongoDB Atlas Service Account Client ID
          name: MDB_MCP_API_CLIENT_ID
          required: false
          type: secret
        - description: MongoDB Atlas Service Account Client Secret
          name: MDB_MCP_API_CLIENT_SECRET
          required: false
          type: secret
    prerequisites:
        environmentVariables:
            - description: MongoDB connection URI (from secret mongodb-credentials)
              name: MDB_MCP_CONNECTION_STRING
              required: true
              type: string
            - description: MongoDB Atlas Service Account client ID (from secret mongodb-atlas-credentials)
              name: MDB_MCP_API_CLIENT_ID
              required: false
              type: string
            - description: MongoDB Atlas Service Account client secret (from secret mongodb-atlas-credentials)
              name: MDB_MCP_API_CLIENT_SECRET
              required: false
              type: string
        secrets:
            - description: kubectl create secret generic mongodb-credentials --from-literal=connection-string=<MDB_MCP_CONNECTION_STRING>
              keys:
                - description: MongoDB connection URI
                  envVarName: MDB_MCP_CONNECTION_STRING
                  key: connection-string
                  required: true
              mountAsFile: false
              name: mongodb-credentials
            - description: kubectl create secret generic mongodb-atlas-credentials --from-literal=api-client-id=<MDB_MCP_API_CLIENT_ID> --from-literal=api-client-secret=<MDB_MCP_API_CLIENT_SECRET>
              keys:
                - description: MongoDB Atlas Service Account client ID
                  envVarName: MDB_MCP_API_CLIENT_ID
                  key: api-client-id
                  required: false
                - description: MongoDB Atlas Service Account client secret
                  envVarName: MDB_MCP_API_CLIENT_SECRET
                  key: api-client-secret
                  required: false
              mountAsFile: false
              name: mongodb-atlas-credentials
    recommendedResources:
        minimal:
            cpu: 100m
            memory: 256Mi
        recommended:
            cpu: 500m
            memory: 512Mi
    requiredEnvironmentVariables:
        - description: MongoDB connection URI
          name: MDB_MCP_CONNECTION_STRING
          required: true
          type: secret
securityIndicators:
    readOnlyTools: false
    secureEndpoint: true
    verifiedSource: true
customProperties:
    architecture:
        metadataType: MetadataStringValue
        string_value: "[\"amd64\"]"
lastUpdateTimeSinceEpoch: "1774027075000"
