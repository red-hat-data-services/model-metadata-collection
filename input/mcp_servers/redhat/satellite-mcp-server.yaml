name: satellite-mcp-server
provider: Red Hat
license: gpl-3.0
license_link: https://www.gnu.org/licenses/gpl-3.0.en.html
description: >-
  Red Hat Satellite (Foreman) MCP server integration.
  Enables agents to interact with Foreman APIs for host management,
  content view lifecycle, remote execution, and errata management.
  Write operations use an allowlist-based security model and are disabled by default.
readme: |-
  # Red Hat Satellite MCP Server

  **MCP Server Summary:**
  Connect AI agents to Red Hat Satellite for host lifecycle and content
  management through the Foreman API.

  ## Features
  - Query Foreman APIs for host inventory, content views, and errata
  - Generic read and write access to Foreman API endpoints
  - Trigger remote execution jobs on managed hosts (opt-in via allowlist)
  - Publish, promote, and update content views (opt-in via allowlist)
  - Poll long-running Foreman task status
  - Custom CA certificate support for TLS validation

  ## Prerequisites
  - Red Hat Satellite 6.18+ instance
  - Foreman credentials (username/password or token)
  - CA bundle certificate for TLS validation
  - Kubernetes secrets for credentials and CA bundle

  ## Configuration
  ```bash
  kubectl create secret generic satellite-credentials \
    --from-literal=username=your-foreman-username \
    --from-literal=password=your-foreman-password
  kubectl create secret generic satellite-ca \
    --from-file=ca.pem=/path/to/satellite-ca-bundle.pem
  ```
  The server is configured with `--foreman-url https://satellite.example.com`.
version: "6.18"
transports:
  - http
  - sse
deploymentMode: local
logo: data:image/svg+xml;base64,
documentationUrl: https://docs.redhat.com/en/documentation/red_hat_satellite
repositoryUrl: https://github.com/theforeman/foreman-mcp-server
sourceCode: theforeman/foreman-mcp-server
publishedDate: "2025-02-15T00:00:00Z"
tools:
  - name: call_foreman_api_get
    description: Read Foreman API resources via GET request
    accessType: read_only
    parameters:
      - name: endpoint
        type: string
        description: Foreman API endpoint path (e.g., /api/hosts)
        required: true
  - name: call_foreman_api_post
    description: Create or update Foreman resources via POST request
    accessType: read_write
    parameters:
      - name: endpoint
        type: string
        description: Foreman API endpoint path
        required: true
      - name: body
        type: object
        description: JSON request body
        required: true
  - name: poll_task
    description: Monitor the status of a long-running Foreman task
    accessType: read_only
    parameters:
      - name: task_id
        type: string
        description: Foreman task ID to poll
        required: true
  - name: trigger_remote_execution_job
    description: Execute a remote job on managed hosts (requires allowlist via FOREMAN_ALLOWED_REX_FEATURES)
    accessType: read_write
    parameters:
      - name: feature
        type: string
        description: "Remote execution feature (e.g., katello_errata_install, katello_package_install)"
        required: true
      - name: host
        type: string
        description: Target host FQDN or ID
        required: true
      - name: inputs
        type: object
        description: Feature-specific input parameters
        required: false
  - name: publish_content_view
    description: Publish a new content view version (requires allowlist via FOREMAN_ALLOWED_CV_ACTIONS)
    accessType: read_write
    parameters:
      - name: content_view_id
        type: string
        description: Content view ID to publish
        required: true
  - name: promote_content_view_version
    description: Promote a content view version to a lifecycle environment (requires allowlist via FOREMAN_ALLOWED_CV_ACTIONS)
    accessType: read_write
    parameters:
      - name: version_id
        type: string
        description: Content view version ID
        required: true
      - name: environment_id
        type: string
        description: Target lifecycle environment ID
        required: true
  - name: incremental_content_view_update
    description: Add errata to a content view version incrementally (requires allowlist via FOREMAN_ALLOWED_CV_ACTIONS)
    accessType: read_write
    parameters:
      - name: content_view_version_id
        type: string
        description: Content view version ID to update
        required: true
      - name: errata_ids
        type: array
        description: List of errata IDs to add
        required: true
artifacts:
  - uri: oci://registry.redhat.io/satellite/foreman-mcp-server-rhel9:6.18
    createTimeSinceEpoch: "1769520262000"
    lastUpdateTimeSinceEpoch: "1769520266000"
runtimeMetadata:
  defaultPort: 8080
  mcpPath: /mcp
  defaultArgs:
    - --foreman-url
    - https://satellite.example.com
    - --ca-bundle
    - /app/ca.pem
  prerequisites:
    secrets:
      - name: satellite-credentials
        description: kubectl create secret generic satellite-credentials --from-literal=username=your-foreman-username --from-literal=password=your-foreman-password
        keys:
          - key: username
            description: Foreman authentication username
            envVarName: FOREMAN_USERNAME
            required: true
          - key: password
            description: Foreman authentication password or token
            envVarName: FOREMAN_PASSWORD
            required: true
        mountAsFile: false
      - name: satellite-ca
        description: kubectl create secret generic satellite-ca --from-file=ca.pem=/path/to/satellite-ca-bundle.pem
        keys:
          - key: ca.pem
            description: Satellite CA certificate bundle for TLS validation
            required: true
        mountAsFile: true
        mountPath: /app
    environmentVariables:
      - name: FOREMAN_USERNAME
        description: Foreman authentication username (from secret satellite-credentials)
        required: true
        type: string
      - name: FOREMAN_PASSWORD
        description: Foreman authentication password or token (from secret satellite-credentials)
        required: true
        type: string
      - name: FOREMAN_CA_BUNDLE
        description: Path to custom CA certificate bundle
        required: false
        type: string
      - name: FOREMAN_ALLOWED_REX_FEATURES
        description: "Comma-separated allowlist of remote execution features (e.g., katello_errata_install,katello_package_install)"
        required: false
        type: string
      - name: FOREMAN_ALLOWED_CV_ACTIONS
        description: "Comma-separated allowlist of content view actions (e.g., publish,promote,incremental_update)"
        required: false
        type: string
securityIndicators:
  verifiedSource: true
  secureEndpoint: true
  sast: true
  readOnlyTools: false
customProperties:
  architecture:
    metadataType: MetadataStringValue
    string_value: "[\"amd64\"]"
  satellite:
    metadataType: MetadataStringValue
    string_value: ""
  lifecycle:
    metadataType: MetadataStringValue
    string_value: ""
  patch-management:
    metadataType: MetadataStringValue
    string_value: ""
  infrastructure:
    metadataType: MetadataStringValue
    string_value: ""
createTimeSinceEpoch: "1739577600000"
lastUpdateTimeSinceEpoch: "1769520266000"
