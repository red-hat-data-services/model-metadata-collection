runtimeMetadata:
    defaultArgs:
        - --transport
        - http
    prerequisites:
        environmentVariables:
            - description: Azure Entra ID tenant identifier (from secret azure-sp-credentials)
              name: AZURE_TENANT_ID
              required: true
              type: string
            - description: Azure Service Principal client ID (from secret azure-sp-credentials)
              name: AZURE_CLIENT_ID
              required: true
              type: string
            - description: Azure Service Principal client secret (from secret azure-sp-credentials)
              name: AZURE_CLIENT_SECRET
              required: true
              type: string
            - description: Azure subscription ID
              name: AZURE_SUBSCRIPTION_ID
              required: true
              type: string
            - description: ASP.NET Core URLs configuration
              name: ASPNETCORE_URLS
              required: true
              type: string
            - description: Azure AD instance URL
              name: AzureAd_Instance
              required: true
              type: string
            - description: Azure AD tenant ID
              name: AzureAd_TenantId
              required: true
              type: string
            - description: Azure AD client ID (from secret azure-ad-credentials)
              name: AzureAd_ClientId
              required: true
              type: string
            - description: Azure AD audience
              name: AzureAd_Audience
              required: true
              type: string
        secrets:
            - description: kubectl create secret generic azure-sp-credentials --from-literal=tenant-id=<AZURE_TENANT_ID> --from-literal=client-id=<AZURE_CLIENT_ID> --from-literal=client-secret=<AZURE_CLIENT_SECRET>
              keys:
                - description: Azure Entra ID tenant identifier
                  envVarName: AZURE_TENANT_ID
                  key: tenant-id
                  required: true
                - description: Azure Service Principal client ID
                  envVarName: AZURE_CLIENT_ID
                  key: client-id
                  required: true
                - description: Azure Service Principal client secret
                  envVarName: AZURE_CLIENT_SECRET
                  key: client-secret
                  required: true
              mountAsFile: false
              name: azure-sp-credentials
            - description: kubectl create secret generic azure-ad-credentials --from-literal=ad-client-id=<AzureAd_ClientId>
              keys:
                - description: Azure AD client ID for inbound authentication
                  envVarName: AzureAd_ClientId
                  key: ad-client-id
                  required: true
              mountAsFile: false
              name: azure-ad-credentials
    recommendedResources:
        minimal:
            cpu: 100m
            memory: 256Mi
        recommended:
            cpu: 500m
            memory: 512Mi
    requiredEnvironmentVariables:
        - description: Azure Entra ID tenant identifier
          name: AZURE_TENANT_ID
          required: true
          type: secret
        - description: Azure Service Principal client ID
          name: AZURE_CLIENT_ID
          required: true
          type: secret
        - description: Azure Service Principal client secret
          name: AZURE_CLIENT_SECRET
          required: true
          type: secret
        - default: /tmp/.net
          description: A writable extraction directory
          name: DOTNET_BUNDLE_EXTRACT_BASE_DIR
          required: true
          type: config
        - default: /tmp
          description: Used for ASP.NET DataProtection key storage
          name: HOME
          required: true
          type: config
        - default: "true"
          description: .NET defaults to binding on localhost only, making it unreachable from the Service.
          name: ALLOW_INSECURE_EXTERNAL_BINDING
          required: true
          type: config
        - description: ASP.NET Core URLs configuration
          name: ASPNETCORE_URLS
          required: true
          type: config
        - description: Azure AD instance URL
          name: AzureAd_Instance
          required: true
          type: config
        - description: Azure AD tenant ID
          name: AzureAd_TenantId
          required: true
          type: config
        - description: Azure AD client ID
          name: AzureAd_ClientId
          required: true
          type: secret
        - description: Azure AD audience
          name: AzureAd_Audience
          required: true
          type: config
        - description: Azure subscription ID
          name: AZURE_SUBSCRIPTION_ID
          required: true
          type: config
securityIndicators:
    readOnlyTools: false
    secureEndpoint: true
    verifiedSource: true
customProperties:
    architecture:
