name: dynatrace-oss/dynatrace-mcp
provider: Dynatrace
license: MIT
license_link: https://opensource.org/licenses/MIT
description: AI Assistants can interact with the Dynatrace observability platform, bringing real-time observability data directly into your development workflow. Query logs, events, spans, metrics via DQL.
readme: |-
    # Dynatrace MCP Server

    The local Dynatrace MCP server allows AI Assistants to interact with the
    Dynatrace observability platform, bringing real-time observability data
    directly into your development workflow.

    ## Use Cases
    - **Real-time observability** — Fetch production-level data for early detection and proactive monitoring
    - **Contextual debugging** — Fix issues with full context from monitored exceptions, logs, and anomalies
    - **Security insights** — Detailed vulnerability analysis and security problem tracking
    - **Natural language queries** — AI-powered DQL generation and explanation
    - **Multi-phase incident investigation** — Systematic approach with automated impact assessment
    - **DevOps automation** — Deployment health gates with automated promotion/rollback logic

    ## Capabilities
    - Observability & Problem Management (list_problems, list_vulnerabilities, list_exceptions, get_kubernetes_events)
    - Querying Data from Grail (execute_dql, verify_dql, generate_dql_from_natural_language, explain_dql_in_natural_language)
    - Entity Discovery (find_entity_by_name)
    - Dynatrace Intelligence (chat_with_davis_copilot, list_davis_analyzers, execute_davis_analyzer)
    - Automation & Notifications (create_workflow_for_notification, send_slack_message, send_email, send_event)
    - Share results (create_dynatrace_notebook)

    ## Prerequisites
    - Node.js runtime
    - Dynatrace Platform environment URL (DT_ENVIRONMENT)
    - Authentication via browser-based Authorization Code Flow (default), Platform Token, or OAuth Client

    ## Quick Start
    ```bash
    npx -y @dynatrace-oss/dynatrace-mcp-server
    ```

    ## Transports
    Supports stdio (default) and HTTP server mode. HTTP mode available via `--http` flag
    with configurable port and host binding.

    ## Costs
    While the MCP server is free, using capabilities that query Dynatrace Grail storage
    may incur costs based on your Dynatrace consumption model (depends on GB scanned).
    Built-in budget tracking via DT_GRAIL_QUERY_BUDGET_GB (default: 1000 GB).
version: 1.4.0
transports:
    - stdio
    - http
logo: data:image/png;base64,
documentationUrl: https://www.dynatrace.com/hub/detail/dynatrace-mcp-server/
repositoryUrl: https://github.com/dynatrace-oss/dynatrace-mcp
deploymentMode: local
tags:
    - dynatrace
    - observability
    - monitoring
    - apm
    - dql
    - logs
    - metrics
    - traces
tools:
    - name: execute_dql
      description: Query Dynatrace using natural language or DQL (Dynatrace Query Language) statements; retrieves logs, events, spans, and metrics
      accessType: read_only
      parameters:
        - name: query
          type: string
          description: DQL query or natural language description of data to retrieve
          required: true
    - name: list_problems
      description: Identify service issues from monitored infrastructure
      accessType: read_only
      parameters:
        - name: timeframe
          type: string
          description: Time range for problem search
          required: false
        - name: status
          type: string
          description: Filter by problem status
          required: false
    - name: send_event
      description: Transmit custom event data to Dynatrace for ingestion
      accessType: execute
      parameters:
        - name: event
          type: object
          description: Event data to send to Dynatrace
          required: true
    - name: get_environment_info
      description: Retrieve Dynatrace environment information
      accessType: read_only
      parameters: []
    - name: list_vulnerabilities
      description: List security vulnerabilities detected by Dynatrace
      accessType: read_only
      parameters: []
    - name: find_entity_by_name
      description: Find entities by name in Dynatrace
      accessType: read_only
      parameters: []
    - name: send_slack_message
      description: Send notification message to Slack
      accessType: execute
      parameters: []
    - name: verify_dql
      description: Verify DQL query syntax
      accessType: read_only
      parameters: []
    - name: generate_dql_from_natural_language
      description: Generate DQL query from natural language description
      accessType: read_only
      parameters: []
    - name: explain_dql_in_natural_language
      description: Explain DQL query in natural language
      accessType: read_only
      parameters: []
    - name: chat_with_davis_copilot
      description: Interact with Davis AI Copilot
      accessType: read_only
      parameters: []
    - name: create_workflow_for_notification
      description: Create Dynatrace workflow for notifications
      accessType: read_write
      parameters: []
    - name: make_workflow_public
      description: Make Dynatrace workflow public
      accessType: read_write
      parameters: []
    - name: get_kubernetes_events
      description: Retrieve Kubernetes events from Dynatrace
      accessType: read_only
      parameters: []
    - name: reset_grail_budget
      description: Reset Grail budget limits
      accessType: execute
      parameters: []
    - name: send_email
      description: Send email notification
      accessType: execute
      parameters: []
    - name: list_exceptions
      description: List exceptions detected by Dynatrace
      accessType: read_only
      parameters: []
    - name: list_davis_analyzers
      description: List available Davis analyzers
      accessType: read_only
      parameters: []
    - name: execute_davis_analyzer
      description: Execute Davis analyzer for root cause analysis
      accessType: execute
      parameters: []
    - name: create_dynatrace_notebook
      description: Create new Dynatrace notebook
      accessType: read_write
      parameters: []
artifacts:
    - uri: oci://quay.io/rhoai-partner-mcp/ubi10-dynatrace-oss-mcp:1773859835
      createTimeSinceEpoch: "1773865179000"
      lastUpdateTimeSinceEpoch: "1773865179000"
runtimeMetadata:
    defaultArgs:
        - node
        - dist/index.js
        - --http
        - --port
        - "3000"
        - --host
        - 0.0.0.0
    prerequisites:
        environmentVariables:
            - description: Dynatrace Platform URL (e.g., https://abc12345.apps.dynatrace.com)
              name: DT_ENVIRONMENT
              required: true
              type: string
            - description: Dynatrace Platform API token (from secret dynatrace-credentials)
              name: DT_PLATFORM_TOKEN
              required: false
              type: string
            - description: OAuth client ID for Dynatrace authentication (from secret dynatrace-credentials)
              name: OAUTH_CLIENT_ID
              required: false
              type: string
            - description: OAuth client secret for Dynatrace authentication (from secret dynatrace-credentials)
              name: OAUTH_CLIENT_SECRET
              required: false
              type: string
        secrets:
            - description: kubectl create secret generic dynatrace-credentials --from-literal=platform-token=<DT_PLATFORM_TOKEN> --from-literal=oauth-client-id=<OAUTH_CLIENT_ID> --from-literal=oauth-client-secret=<OAUTH_CLIENT_SECRET>
              keys:
                - description: Dynatrace Platform API token
                  envVarName: DT_PLATFORM_TOKEN
                  key: platform-token
                  required: false
                - description: OAuth client ID for Dynatrace authentication
                  envVarName: OAUTH_CLIENT_ID
                  key: oauth-client-id
                  required: false
                - description: OAuth client secret for Dynatrace authentication
                  envVarName: OAUTH_CLIENT_SECRET
                  key: oauth-client-secret
                  required: false
              mountAsFile: false
              name: dynatrace-credentials
    recommendedResources:
        minimal:
            cpu: 100m
            memory: 128Mi
        recommended:
            cpu: 250m
            memory: 256Mi
    requiredEnvironmentVariables:
        - description: Dynatrace Platform URL
          name: DT_ENVIRONMENT
          required: true
          type: config
        - description: Dynatrace Platform API token
          name: DT_PLATFORM_TOKEN
          required: false
          type: secret
        - description: OAuth client ID for Dynatrace authentication
          name: OAUTH_CLIENT_ID
          required: false
          type: secret
        - description: OAuth client secret for Dynatrace authentication
          name: OAUTH_CLIENT_SECRET
          required: false
          type: secret
securityIndicators:
    readOnlyTools: false
    secureEndpoint: true
    verifiedSource: true
customProperties:
    architecture:
        metadataType: MetadataStringValue
        string_value: "[\"amd64\"]"
lastUpdateTimeSinceEpoch: "1773865179000"
