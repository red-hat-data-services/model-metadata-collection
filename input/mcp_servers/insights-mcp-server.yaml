runtimeMetadata:
    defaultPort: 8000
    mcpPath: /mcp
    prerequisites:
        environmentVariables:
            - description: Service account client ID (from secret insights-credentials)
              name: LIGHTSPEED_CLIENT_ID
              required: true
              type: string
            - description: Service account client secret (from secret insights-credentials)
              name: LIGHTSPEED_CLIENT_SECRET
              required: true
              type: string
            - description: Override the default Lightspeed API endpoint
              name: LIGHTSPEED_BASE_URL
              required: false
              type: string
            - description: Override the default SSO endpoint
              name: LIGHTSPEED_SSO_BASE_URL
              required: false
              type: string
            - description: Override the default proxy endpoint
              name: LIGHTSPEED_PROXY_URL
              required: false
              type: string
        secrets:
            - description: kubectl create secret generic insights-credentials --from-literal=client-id=<your-client-id> --from-literal=client-secret=<your-client-secret>
              keys:
                - description: Service account client ID from console.redhat.com
                  envVarName: LIGHTSPEED_CLIENT_ID
                  key: client-id
                  required: true
                - description: Service account client secret from console.redhat.com
                  envVarName: LIGHTSPEED_CLIENT_SECRET
                  key: client-secret
                  required: true
              mountAsFile: false
              name: insights-credentials
securityIndicators:
    readOnlyTools: false
    sast: true
    secureEndpoint: true
    verifiedSource: true
customProperties:
    architecture:
        metadataType: MetadataStringValue
        string_value: "[\"amd64\",\"arm64\"]"
    insights:
        metadataType: MetadataStringValue
        string_value: ""
    observability:
        metadataType: MetadataStringValue
        string_value: ""
    security:
        metadataType: MetadataStringValue
        string_value: ""
