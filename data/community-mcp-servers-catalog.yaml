source: Community MCP
mcp_servers:
    - name: mariadb/mcp
      provider: MariaDB
      license: MIT
      license_link: https://opensource.org/licenses/MIT
      description: A standard interface for managing and querying MariaDB databases. Supports SQL operations and schema inspection.
      readme: |-
        # MariaDB MCP Server

        A Model Context Protocol (MCP) server providing a standard interface for
        managing and querying MariaDB databases. Enables AI assistants to interact
        with MariaDB through schema inspection and SQL execution.

        ## Features
        - **Schema Inspection** — List databases, tables, and retrieve table schemas with column definitions and foreign key relationships
        - **SQL Execution** — Run SQL queries with configurable read-only mode for safe operation
        - **Database Management** — Create databases directly through MCP tools
        - **Embedding Support** — Optional vector embedding integration with OpenAI, Google Gemini, or HuggingFace models
        - **Multiple Transports** — Supports stdio, SSE, and HTTP transports

        ## Tools
        - list_databases — Enumerate all accessible databases
        - list_tables — Show all tables in a database
        - get_table_schema — Retrieve column definitions and keys
        - get_table_schema_with_relations — Schema with foreign key relationships
        - execute_sql — Run SQL queries (read-only by default)
        - create_database — Create a new database

        ## Authentication
        Connects to MariaDB using standard credentials (DB_USER, DB_PASSWORD,
        DB_HOST). Supports both authenticated and unauthenticated access
        depending on the MariaDB server configuration.

        ## Prerequisites
        - MariaDB server with access credentials
        - Python 3.11+ or Docker
        - Optional: Embedding provider credentials (OpenAI, Gemini, or HuggingFace)

        ## Quick Start
        ```bash
        docker pull mariadb/mcp
        ```

        ## Transports
        Supports stdio (default), SSE, and HTTP transports. For HTTP/SSE
        transports, configure host and port via command-line arguments.
      version: 1.0.0
      transports:
        - stdio
        - http
        - sse
      logo: data:image/png;base64,
      documentationUrl: https://github.com/mariadb/mcp
      repositoryUrl: https://github.com/mariadb/mcp
      deploymentMode: local
      tags:
        - mariadb
        - mysql
        - database
        - sql
      tools:
        - name: list_databases
          description: Enumerate all accessible databases on the MariaDB server
          accessType: read_only
          parameters: []
        - name: list_tables
          description: Show all tables in a specified database
          accessType: read_only
          parameters:
            - name: database
              type: string
              description: Database name to list tables from
              required: true
        - name: get_table_schema
          description: Retrieve column definitions, types, and keys for a table
          accessType: read_only
          parameters:
            - name: table
              type: string
              description: Table name to get schema for
              required: true
        - name: get_table_schema_with_relations
          description: Retrieve table schema including foreign key relationships
          accessType: read_only
          parameters:
            - name: table
              type: string
              description: Table name to get schema with relations for
              required: true
        - name: execute_sql
          description: Run SQL queries (read-only mode by default, controlled by MCP_READ_ONLY env var)
          accessType: read_write
          parameters:
            - name: query
              type: string
              description: SQL query to execute
              required: true
        - name: create_database
          description: Create a new database on the MariaDB server
          accessType: read_write
          parameters:
            - name: name
              type: string
              description: Name of the database to create
              required: true
      artifacts:
        - uri: oci://quay.io/rhoai-partner-mcp/ubi10-mariadb-mcp:1774297776
          createTimeSinceEpoch: "1774297749000"
          lastUpdateTimeSinceEpoch: "1774297749000"
      runtimeMetadata:
        defaultArgs:
            - python
            - src/server.py
            - --host
            - 0.0.0.0
            - --transport
            - http
            - --port
            - "9001"
        defaultPort: 9001
        optionalEnvironmentVariables:
            - default: "3306"
              description: MariaDB server port
              name: DB_PORT
              type: config
            - default: "true"
              description: Enforce read-only mode for SQL queries
              name: MCP_READ_ONLY
              type: config
        prerequisites:
            environmentVariables:
                - description: MariaDB username (from secret mariadb-credentials)
                  name: DB_USER
                  required: true
                  type: string
                - description: MariaDB password (from secret mariadb-credentials)
                  name: DB_PASSWORD
                  required: true
                  type: string
                - description: MariaDB server hostname
                  name: DB_HOST
                  required: true
                  type: string
                - description: MariaDB database name (optional; can be set per query)
                  name: DB_NAME
                  required: false
                  type: string
                - description: MariaDB server port (default 3306)
                  name: DB_PORT
                  required: false
                  type: string
                - description: Enforce read-only mode for SQL queries (default true)
                  name: MCP_READ_ONLY
                  required: false
                  type: string
                - description: Comma-separated list of allowed Host header values
                  name: ALLOWED_HOSTS
                  required: true
                  type: string
            secrets:
                - description: kubectl create secret generic mariadb-credentials --from-literal=db-user=<DB_USER> --from-literal=db-password=<DB_PASSWORD>
                  keys:
                    - description: MariaDB username
                      envVarName: DB_USER
                      key: db-user
                      required: true
                    - description: MariaDB password
                      envVarName: DB_PASSWORD
                      key: db-password
                      required: true
                  mountAsFile: false
                  name: mariadb-credentials
        recommendedResources:
            minimal:
                cpu: 250m
                memory: 512Mi
            recommended:
                cpu: 500m
                memory: 1Gi
        requiredEnvironmentVariables:
            - description: MariaDB username
              name: DB_USER
              required: true
              type: secret
            - description: MariaDB password
              name: DB_PASSWORD
              required: true
              type: secret
            - description: MariaDB server hostname
              name: DB_HOST
              required: true
              type: config
            - description: MariaDB database name (optional; can be set per query)
              name: DB_NAME
              required: false
              type: config
            - description: Comma-separated list of allowed Host header values
              name: ALLOWED_HOSTS
              required: true
              type: config
      securityIndicators:
        readOnlyTools: false
        secureEndpoint: true
        verifiedSource: true
      customProperties:
        architecture:
            metadataType: MetadataStringValue
            string_value: "[\"amd64\"]"
      lastUpdateTimeSinceEpoch: "1774297749000"
    - name: mongodb-js/mongodb-mcp-server
      provider: MongoDB
      license: Apache-2.0
      license_link: https://www.apache.org/licenses/LICENSE-2.0
      description: Interact with MongoDB databases and MongoDB Atlas. Provides database operations, Atlas cluster management, performance analysis, and query execution capabilities.
      readme: |-
        # MongoDB MCP Server

        A Model Context Protocol server for interacting with MongoDB databases
        and MongoDB Atlas. Enables AI assistants to perform database operations,
        manage Atlas clusters, analyze performance, and execute queries.

        ## Features
        - **Database Operations** — Query, aggregate, and manage MongoDB collections with configurable read-only mode
        - **Schema Intelligence** — Infer collection schemas, inspect indexes, and analyze storage
        - **Atlas Integration** — Manage Atlas clusters, projects, and users via Atlas API Service Accounts
        - **Knowledge Sources** — Search MongoDB documentation and knowledge bases
        - **Multiple Transports** — Supports stdio and HTTP transports
        - **Safety Controls** — Read-only mode, index enforcement, and confirmation-required tools

        ## Tools
        - find, aggregate, count — Query and analyze collection data
        - list-databases, list-collections — Enumerate database resources
        - collection-schema, collection-indexes — Schema and index inspection
        - collection-storage-size, db-stats — Storage and performance metrics
        - connect — Establish MongoDB connections
        - explain — Query execution plan analysis
        - export — Export collection data
        - mongodb-logs — Server log retrieval
        - list-knowledge-sources, search-knowledge — Documentation search

        ## Authentication
        Connects via MongoDB connection string (MDB_MCP_CONNECTION_STRING)
        or Atlas API Service Account credentials (MDB_MCP_API_CLIENT_ID,
        MDB_MCP_API_CLIENT_SECRET). The server will not start unless at
        least one authentication method is configured.

        ## Prerequisites
        - Node.js 20.19.0+ (or v22.12.0+, or 23+) or Docker
        - MongoDB connection string or Atlas API credentials
        - Optional: Atlas Service Account for cluster management tools

        ## Quick Start
        ```bash
        npx -y mongodb-mcp-server@latest --readOnly
        ```

        ## Transports
        Supports stdio (default) and HTTP transports. HTTP mode configurable
        via MDB_MCP_HTTP_HOST, MDB_MCP_HTTP_PORT environment variables.
      version: 1.0.0
      transports:
        - stdio
        - http
      logo: data:image/png;base64,
      documentationUrl: https://www.mongodb.com/docs/mcp-server/get-started/
      repositoryUrl: https://github.com/mongodb-js/mongodb-mcp-server
      deploymentMode: local
      tags:
        - mongodb
        - nosql
        - database
        - atlas
        - document-database
        - aggregation
        - query
      tools:
        - name: find
          description: Run a find query against a MongoDB collection
          accessType: read_only
          parameters: []
        - name: aggregate
          description: Run an aggregation against a MongoDB collection
          accessType: read_only
          parameters: []
        - name: list-databases
          description: List all databases for a MongoDB connection
          accessType: read_only
          parameters: []
        - name: list-collections
          description: List all collections for a given database
          accessType: read_only
          parameters: []
        - name: collection-schema
          description: Describe the schema for a collection
          accessType: read_only
          parameters: []
        - name: collection-indexes
          description: Describe the indexes for a collection
          accessType: read_only
          parameters: []
        - name: collection-storage-size
          description: Get storage size information for a collection
          accessType: read_only
          parameters: []
        - name: connect
          description: Establish connection to MongoDB instance
          accessType: read_only
          parameters: []
        - name: count
          description: Count documents in a collection
          accessType: read_only
          parameters: []
        - name: db-stats
          description: Retrieve database statistics
          accessType: read_only
          parameters: []
        - name: explain
          description: Explain query execution plan
          accessType: read_only
          parameters: []
        - name: export
          description: Export data from MongoDB collection
          accessType: read_only
          parameters: []
        - name: mongodb-logs
          description: Retrieve MongoDB server logs
          accessType: read_only
          parameters: []
        - name: list-knowledge-sources
          description: List available knowledge sources
          accessType: read_only
          parameters: []
        - name: search-knowledge
          description: Search across knowledge sources
          accessType: read_only
          parameters: []
      artifacts:
        - uri: oci://quay.io/rhoai-partner-mcp/ubi10-mongodb-mcp-server:1774027206
          createTimeSinceEpoch: "1774027075000"
          lastUpdateTimeSinceEpoch: "1774027075000"
      runtimeMetadata:
        defaultArgs:
            - --transport
            - http
            - --httpHost
            - 0.0.0.0
            - --httpPort
            - "9002"
            - --readOnly
        defaultPort: 9002
        optionalEnvironmentVariables:
            - description: MongoDB Atlas Service Account Client ID
              name: MDB_MCP_API_CLIENT_ID
              required: false
              type: secret
            - description: MongoDB Atlas Service Account Client Secret
              name: MDB_MCP_API_CLIENT_SECRET
              required: false
              type: secret
        prerequisites:
            environmentVariables:
                - description: MongoDB connection URI (from secret mongodb-credentials)
                  name: MDB_MCP_CONNECTION_STRING
                  required: true
                  type: string
                - description: MongoDB Atlas Service Account client ID (from secret mongodb-atlas-credentials)
                  name: MDB_MCP_API_CLIENT_ID
                  required: false
                  type: string
                - description: MongoDB Atlas Service Account client secret (from secret mongodb-atlas-credentials)
                  name: MDB_MCP_API_CLIENT_SECRET
                  required: false
                  type: string
            secrets:
                - description: kubectl create secret generic mongodb-credentials --from-literal=connection-string=<MDB_MCP_CONNECTION_STRING>
                  keys:
                    - description: MongoDB connection URI
                      envVarName: MDB_MCP_CONNECTION_STRING
                      key: connection-string
                      required: true
                  mountAsFile: false
                  name: mongodb-credentials
                - description: kubectl create secret generic mongodb-atlas-credentials --from-literal=api-client-id=<MDB_MCP_API_CLIENT_ID> --from-literal=api-client-secret=<MDB_MCP_API_CLIENT_SECRET>
                  keys:
                    - description: MongoDB Atlas Service Account client ID
                      envVarName: MDB_MCP_API_CLIENT_ID
                      key: api-client-id
                      required: false
                    - description: MongoDB Atlas Service Account client secret
                      envVarName: MDB_MCP_API_CLIENT_SECRET
                      key: api-client-secret
                      required: false
                  mountAsFile: false
                  name: mongodb-atlas-credentials
        recommendedResources:
            minimal:
                cpu: 100m
                memory: 256Mi
            recommended:
                cpu: 500m
                memory: 512Mi
        requiredEnvironmentVariables:
            - description: MongoDB connection URI
              name: MDB_MCP_CONNECTION_STRING
              required: true
              type: secret
      securityIndicators:
        readOnlyTools: false
        secureEndpoint: true
        verifiedSource: true
      customProperties:
        architecture:
            metadataType: MetadataStringValue
            string_value: "[\"amd64\"]"
      lastUpdateTimeSinceEpoch: "1774027075000"
