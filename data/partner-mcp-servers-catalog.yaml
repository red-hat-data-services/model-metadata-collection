    - name: hashicorp/terraform-mcp-server
      provider: IBM Terraform
      license: MPL-2.0
      license_link: https://www.mozilla.org/en-US/MPL/2.0/
      description: 'Gain real-time access to current Terraform provider documentation, modules, and policies from the Terraform registry. Supports HCP Terraform and Terraform Enterprise workspace management. NOTE: Beta software - do not use in production environments.'
      readme: |-
        # Terraform MCP Server

        The Terraform MCP Server is a Model Context Protocol (MCP) server that
        provides seamless integration with Terraform Registry APIs, enabling
        advanced automation and interaction capabilities for Infrastructure as
        Code (IaC) development.

        ## Features
        - **Dual Transport Support** — Both Stdio and StreamableHTTP transports with configurable endpoints
        - **Terraform Registry Integration** — Direct integration with public Terraform Registry APIs for providers, modules, and policies
        - **HCP Terraform & Terraform Enterprise Support** — Full workspace management, organization/project listing, and private registry access
        - **Workspace Operations** — Create, update, delete workspaces with support for variables, tags, and run management
        - **OTel Metrics** — Integration with OpenTelemetry meters to track tool-call volume, latency, and failures in Streamable HTTP mode

        ## Tools
        - search_providers, get_provider_details — Terraform provider discovery
        - search_modules, get_module_details — Module discovery
        - list_workspaces, create_workspace, get_workspace_details — Workspace management
        - list_runs, create_run — Run management
        - search_policies — Sentinel policy search

        ## Prerequisites
        - Docker installed and running
        - AI assistant that supports the Model Context Protocol (MCP)
        - Optional: HCP Terraform or Terraform Enterprise API token (TFE_TOKEN) for workspace management and private registry access

        ## Quick Start
        ```bash
        docker run -i --rm hashicorp/terraform-mcp-server
        ```

        ## Transports
        Supports stdio (default) and StreamableHTTP transports. HTTP mode is enabled
        via TRANSPORT_MODE=streamable-http with configurable host, port, and endpoint.

        ## Security
        When using StreamableHTTP transport, configure MCP_ALLOWED_ORIGINS to restrict
        access to trusted origins. The MCP server is intended for local use only.
      version: 0.4.0
      transports:
        - stdio
        - http
      logo: data:image/png;base64,
      documentationUrl: https://developer.hashicorp.com/terraform/docs/tools/mcp-server
      repositoryUrl: https://github.com/hashicorp/terraform-mcp-server
      deploymentMode: local
      tags:
        - terraform
        - hashicorp
        - infrastructure-as-code
        - iac
        - registry
        - providers
        - modules
        - workspaces
        - hcp-terraform
        - beta
      tools:
        - name: search_providers
          description: Search for Terraform providers in the registry
          accessType: read_only
          parameters:
            - name: query
              type: string
              description: Search query for providers
              required: true
        - name: get_provider_details
          description: Get details about a specific Terraform provider
          accessType: read_only
          parameters:
            - name: provider
              type: string
              description: Provider namespace/name
              required: true
        - name: search_modules
          description: Search for Terraform modules in the registry
          accessType: read_only
          parameters:
            - name: query
              type: string
              description: Search query for modules
              required: true
        - name: get_module_details
          description: Get details about a specific Terraform module
          accessType: read_only
          parameters:
            - name: module
              type: string
              description: Module namespace/name/provider
              required: true
        - name: list_workspaces
          description: List workspaces in a Terraform organization
          accessType: read_only
          parameters:
            - name: organization
              type: string
              description: Organization name
              required: true
        - name: create_workspace
          description: Create a new workspace in HCP Terraform/TFE
          accessType: read_write
          parameters:
            - name: organization
              type: string
              description: Organization name
              required: true
            - name: name
              type: string
              description: Workspace name
              required: true
        - name: get_workspace_details
          description: Get details of a specific workspace
          accessType: read_only
          parameters:
            - name: workspace
              type: string
              description: Workspace name or ID
              required: true
        - name: list_runs
          description: List runs in a workspace
          accessType: read_only
          parameters:
            - name: workspace
              type: string
              description: Workspace name or ID
              required: true
        - name: create_run
          description: Create a new run in a workspace
          accessType: execute
          parameters:
            - name: workspace
              type: string
              description: Workspace name or ID
              required: true
        - name: search_policies
          description: Search for Sentinel policies in the registry
          accessType: read_only
          parameters:
            - name: query
              type: string
              description: Search query for policies
              required: true
