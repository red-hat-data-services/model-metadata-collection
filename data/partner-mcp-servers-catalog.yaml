    - name: enterprisedb/pg-airman-mcp
      provider: EnterpriseDB
      license: Apache-2.0
      license_link: https://www.apache.org/licenses/LICENSE-2.0
      description: Open-source Model Context Protocol server supporting AI agents throughout the complete PostgreSQL database development lifecycle—from initial coding through testing, deployment, and production tuning and maintenance
      readme: |-
        # PG Airman MCP

        A Postgres MCP server with index tuning, explain plans, health checks, and
        safe SQL execution.

        ## Overview
        Pg Airman MCP is an open-source MCP server built to support AI agents
        throughout the entire PostgreSQL development lifecycle — from initial coding
        through testing, deployment, and production tuning and maintenance.

        ## Features
        - **Database Health** — Analyze index health, connection utilization, buffer cache, vacuum health, sequence limits, replication lag, and more
        - **Index Tuning** — Explore thousands of possible indexes to find the best solution for your workload using industrial-strength algorithms
        - **Query Plans** — Validate and optimize performance by reviewing EXPLAIN plans and simulating the impact of hypothetical indexes
        - **Schema Intelligence** — Context-aware SQL generation based on detailed understanding of the database schema
        - **Safe SQL Execution** — Configurable access control with read-only mode and safe SQL parsing for both development and production
        - **OAuth 2.0 Authentication** — Optional token-based authentication supporting RFC 7662 token introspection and local JWT validation

        ## Tools
        - list_schemas, list_objects, get_object_details — Schema exploration
        - execute_sql — SQL execution with access mode controls
        - explain_query — Execution plans with hypothetical index simulation
        - get_top_queries — Slow query identification via pg_stat_statements
        - analyze_workload_indexes, analyze_query_indexes — Index recommendations
        - analyze_db_health — Comprehensive health checks
        - add_comment_to_object — Metadata management

        ## Prerequisites
        - PostgreSQL database with access credentials
        - Python 3.12+ or Docker
        - Optional: pg_stat_statements and hypopg extensions for index tuning

        ## Quick Start
        ```bash
        docker pull enterprisedb/pg-airman-mcp
        ```

        ## Transports
        Supports stdio (default), SSE, and Streamable HTTP transports. Network
        transports include optional OAuth 2.0 authentication and DNS rebinding protection.
      version: 1.0.0
      transports:
        - stdio
        - sse
        - http
      logo: data:image/svg+xml;base64,
      documentationUrl: https://github.com/EnterpriseDB/pg-airman-mcp
      repositoryUrl: https://github.com/EnterpriseDB/pg-airman-mcp
      deploymentMode: local
      tags:
        - database
        - postgresql
        - sql
        - query-optimization
        - index-tuning
        - database-health
        - schema-intelligence
        - oauth
      tools:
        - name: list_schemas
          description: Lists all database schemas available in the PostgreSQL instance
          accessType: read_only
          parameters: []
        - name: list_objects
          description: Lists database objects (tables, views, sequences, extensions) within a specified schema
          accessType: read_only
          parameters:
            - name: schema
              type: string
              description: Schema name to list objects from
              required: true
        - name: get_object_details
          description: Provides information about a specific database object, including columns, constraints, and indexes
          accessType: read_only
          parameters:
            - name: object
              type: string
              description: Fully qualified object identifier
              required: true
        - name: execute_sql
          description: Executes SQL statements on the database with read-only limitations in restricted mode
          accessType: read_write
          parameters:
            - name: sql
              type: string
              description: SQL statement to execute
              required: true
        - name: explain_query
          description: Gets the execution plan for a SQL query describing how PostgreSQL will process it
          accessType: read_only
          parameters:
            - name: query
              type: string
              description: SQL query to explain
              required: true
            - name: hypothetical_indexes
              type: array
              description: Optional list of hypothetical indexes to test
              required: false
        - name: get_top_queries
          description: Reports the slowest SQL queries based on total execution time using pg_stat_statements data
          accessType: read_only
          parameters:
            - name: metric
              type: string
              description: Execution time metric for ranking
              required: false
        - name: analyze_workload_indexes
          description: Analyzes the database workload to identify resource-intensive queries and recommends optimal indexes
          accessType: read_only
          parameters:
            - name: workload_params
              type: object
              description: Workload analysis parameters
              required: false
        - name: analyze_query_indexes
          description: Analyzes a list of specific SQL queries (up to 10) and recommends optimal indexes
          accessType: read_only
          parameters:
            - name: queries
              type: array
              description: List of SQL queries (max 10) to analyze
              required: true
        - name: analyze_db_health
          description: Performs comprehensive health checks including buffer cache hit rates, connection health, constraint validation, index health, sequence limits, and vacuum health
          accessType: read_only
          parameters:
            - name: health_params
              type: object
              description: Health check parameters
              required: false
        - name: add_comment_to_object
          description: Adds a comment to a table, view, or column (allowed in restricted mode if ALLOW_COMMENT_IN_RESTRICTED=true)
          accessType: read_write
          parameters:
            - name: object_type
              type: string
              description: Type of object (table, view, column)
              required: true
            - name: object_identifier
              type: string
              description: Fully qualified object identifier
              required: true
            - name: comment
              type: string
              description: Comment text to add
              required: true
      artifacts:
        - uri: oci://quay.io/rhoai-partner-mcp/ubi10-enterprisedb-pg-airman-mcp:1775068164
          createTimeSinceEpoch: "1775067967000"
          lastUpdateTimeSinceEpoch: "1775067967000"
      runtimeMetadata:
        defaultPort: 8001
        optionalEnvironmentVariables:
