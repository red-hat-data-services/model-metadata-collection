    - name: microsoft/azure-mcp-server
      provider: Microsoft
      license: MIT
      license_link: https://opensource.org/licenses/MIT
      description: Enables AI agents and MCP clients to interact with Azure resources through natural language commands. Provides tools for Azure Storage, Cosmos DB, Key Vault, Azure Monitor, AKS, SQL, and 30+ other Azure services.
      readme: |-
        # Azure MCP Server

        All Azure MCP tools in a single server. The Azure MCP Server implements
        the MCP specification to create a seamless connection between AI agents
        and Azure services. Supports 40+ different Azure services.

        ## Features
        - **Dual Transport Support** — Both Stdio and StreamableHTTP transports
        - **40+ Azure Services** — Storage, Cosmos DB, Key Vault, AKS, SQL, Monitor, and more
        - **Workspace Operations** — Full workspace management with HCP support
        - **Sovereign Cloud Support** — Azure Public, China, and US Government clouds

        ## Supported Azure Services
        Cosmos DB, Key Vault, Storage, AKS, SQL, App Configuration, App Service,
        Container Registry, Event Grid, Event Hubs, Functions, Grafana, Monitor,
        MySQL, PostgreSQL, Redis, Search, Service Bus, SignalR, Virtual Desktop,
        Compute, Communication Services, Confidential Ledger, and many more.

        ## Authentication
        Uses Azure Identity credential chain. For container deployments, set
        AZURE_TENANT_ID, AZURE_CLIENT_ID, and AZURE_CLIENT_SECRET environment
        variables (service principal). For local development, authenticate via
        Azure CLI (az login), VS Code Azure extension, or Azure PowerShell.

        ## Prerequisites
        - Azure subscription with appropriate RBAC roles on target resources
        - Azure credentials (service principal for container deployments)
        - .NET runtime (included in container image)

        ## Quick Start
        ```bash
        npx -y @azure/mcp@latest server start
        ```

        ## Transports
        Supports stdio (default) and HTTP transports. HTTP mode supports
        Entra ID bearer token authentication for remote deployments.
