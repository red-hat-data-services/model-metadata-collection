      transports:
        - http
        - sse
      logo: data:image/svg+xml;base64,
      documentationUrl: https://docs.redhat.com/en/documentation/red_hat_ansible_automation_platform/2.6/html/containerized_installation/deploying-ansible-mcp-server
      repositoryUrl: https://github.com/ansible/aap-mcp-server
      sourceCode: ansible/aap-mcp-server
      publishedDate: "2026-02-02T00:00:00Z"
      tools:
        - name: controller.job_templates_launch_create
