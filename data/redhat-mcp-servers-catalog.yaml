          accessType: read_only
          parameters: []
        - name: controller.workflow_jobs_retrieve
          description: Retrieve the status and details of a workflow job
          accessType: read_only
          parameters: []
        - name: controller.inventories_list
          description: List available inventories in Ansible Automation Platform
          accessType: read_only
          parameters: []
        - name: controller.hosts_list
          description: List hosts in an inventory
          accessType: read_only
          parameters: []
        - name: controller.groups_list
          description: List groups in an inventory
          accessType: read_only
          parameters: []
        - name: controller.config_retrieve
          description: Retrieve AAP controller configuration
          accessType: read_only
          parameters: []
        - name: gateway.activitystream_list
          description: List activity stream events from the AAP gateway
          accessType: read_only
          parameters: []
      artifacts:
        - uri: oci://registry.redhat.io/ansible-automation-platform-tech-preview/mcp-server-rhel9:latest
          createTimeSinceEpoch: "1774268095000"
          lastUpdateTimeSinceEpoch: "1774268097000"
      runtimeMetadata:
        defaultPort: 3000
        mcpPath: /mcp
        prerequisites:
            environmentVariables:
                - description: AAP instance URL (from secret aap-credentials)
                  name: BASE_URL
                  required: true
                  type: string
                - description: OAuth2 bearer token for Kubernetes/OpenShift deployment orchestration (injected from secret aap-credentials; not consumed directly by the server runtime — authentication is per-session via HTTP Authorization header)
                  name: BEARER_TOKEN_OAUTH2_AUTHENTICATION
                  required: false
                  type: string
                - description: Server port override (default 3000)
                  name: MCP_PORT
                  required: false
                  type: string
                - description: Enable Prometheus metrics export at /metrics
                  name: ENABLE_METRICS
                  required: false
                  type: string
                - description: Enable write operations (disabled by default)
                  name: ALLOW_WRITE_OPERATIONS
                  required: false
                  type: string
                - description: Bypass TLS certificate validation for self-signed certificates
                  name: IGNORE_CERTIFICATE_ERRORS
                  required: false
                  type: string
                - description: Session timeout in seconds (default 1200)
                  name: SESSION_TIMEOUT
                  required: false
                  type: string
            secrets:
                - description: kubectl create secret generic aap-credentials --from-literal=base-url=https://your-aap-instance.com --from-literal=token=your-oauth2-bearer-token
                  keys:
                    - description: AAP instance URL
                      envVarName: BASE_URL
                      key: base-url
                      required: true
                    - description: OAuth2 bearer token for AAP Gateway API authentication
                      envVarName: BEARER_TOKEN_OAUTH2_AUTHENTICATION
                      key: token
                      required: true
                  mountAsFile: false
                  name: aap-credentials
      securityIndicators:
        readOnlyTools: true
        sast: true
        secureEndpoint: true
        verifiedSource: true
      customProperties:
        ansible:
            metadataType: MetadataStringValue
            string_value: ""
        architecture:
            metadataType: MetadataStringValue
            string_value: "[\"amd64\",\"arm64\",\"ppc64le\",\"s390x\"]"
        automation:
            metadataType: MetadataStringValue
            string_value: ""
        infrastructure:
            metadataType: MetadataStringValue
            string_value: ""
      createTimeSinceEpoch: "1769990400000"
      lastUpdateTimeSinceEpoch: "1774268097000"
    - name: insights-mcp-server
      provider: Red Hat
      license: apache-2.0
      license_link: https://www.apache.org/licenses/LICENSE-2.0
      description: Red Hat Lightspeed MCP server connecting AI agents to Red Hat Insights services. Provides toolsets for advisor recommendations, system inventory, vulnerability assessment, remediations, image building, RHEL lifecycle planning, content sources, RBAC, and subscription management. Read-only by default with optional write tools via --all-tools flag.
      readme: |-
        # Red Hat Lightspeed MCP Server

        **MCP Server Summary:**
        Connect AI agents to Red Hat Lightspeed services for natural language
        interactions with Red Hat Insights, vulnerability management, image building,
        and RHEL lifecycle planning.

        ## Toolsets
        - **Advisor** — Configuration assessment recommendations
        - **Inventory** — System management and host visibility
        - **Vulnerability** — CVE assessment and affected system tracking
        - **Image Builder** — Custom RHEL image blueprint management
        - **Planning** — RHEL lifecycle and upcoming changes
        - **Content Sources** — Repository listing and management
        - **RBAC** — Access information for Insights applications
        - **RHSM** — Activation key management

        ## Security Model
        - Read-only tools enabled by default
        - Write tools (image builder, remediations) require `--all-tools` flag
        - RBAC support restricts access based on console.redhat.com permissions

        ## Prerequisites
        - Service account credentials from console.redhat.com
        - Kubernetes secret `insights-credentials` with `client-id` and `client-secret`

        ## Configuration
        ```bash
        kubectl create secret generic insights-credentials \
          --from-literal=client-id=your-client-id \
          --from-literal=client-secret=your-client-secret
        ```
        The server exposes an HTTP endpoint on port 8000 and SSE on port 9000.
