source: Red Hat MCP
mcp_servers:
    - name: openshift-mcp-server
      provider: Red Hat
      license: apache-2.0
      license_link: https://www.apache.org/licenses/LICENSE-2.0
      description: OpenShift and Kubernetes cluster management MCP server. Allows agents to manage pods, inspect workloads, view logs, list events, and interact with cluster resources using direct Kubernetes API access.
      readme: |-
        # OpenShift MCP Server

        **MCP Server Summary:**
        Access OpenShift and Kubernetes clusters through natural language using a
        native Go implementation that directly interacts with the Kubernetes API server.

        ## Features
        - List, inspect, and manage pods, deployments, and other resources
        - Retrieve pod logs and execute commands in containers
        - Monitor cluster events and resource metrics
        - Browse namespaces and cluster configuration
        - Optional Helm chart management
        - Multi-cluster support with automatic kubeconfig detection
        - Read-only and disable-destructive modes for safe operation

        ## Prerequisites
        - Access to an OpenShift or Kubernetes cluster
        - ServiceAccount with appropriate RBAC permissions

        ## Configuration
        The server can be configured via TOML file or command-line flags.
        Available toolsets: `core`, `config`, `helm`, `kubevirt`, `observability`, `ossm`.
      version: latest
      transports:
        - http
        - sse
      logo: data:image/svg+xml;base64,
      documentationUrl: https://docs.redhat.com/en/documentation/openshift_container_platform
      repositoryUrl: https://github.com/openshift/openshift-mcp-server
      sourceCode: openshift/openshift-mcp-server
      publishedDate: "2025-07-23T00:00:00Z"
      tools:
        - name: pods_list
          description: List pods in a namespace or across all namespaces
          accessType: read_only
          parameters:
            - name: namespace
              type: string
              description: Kubernetes namespace (omit for all namespaces)
              required: false
        - name: pods_get
          description: Get detailed information about a specific pod
          accessType: read_only
          parameters:
            - name: namespace
              type: string
              description: Kubernetes namespace
              required: true
            - name: name
              type: string
              description: Name of the pod
              required: true
        - name: pods_log
          description: Retrieve logs from a pod
          accessType: read_only
          parameters:
            - name: namespace
              type: string
              description: Kubernetes namespace
              required: true
            - name: name
              type: string
              description: Name of the pod
              required: true
            - name: container
              type: string
              description: Container name (optional if pod has only one container)
              required: false
        - name: pods_exec
          description: Execute a command in a running container
          accessType: read_write
          parameters:
            - name: namespace
              type: string
              description: Kubernetes namespace
              required: true
            - name: name
              type: string
              description: Name of the pod
              required: true
            - name: command
              type: array
              description: Command and arguments to execute
              required: true
            - name: container
              type: string
              description: Container name (optional if pod has only one container)
              required: false
        - name: pods_run
          description: Run a new pod with a specified container image
          accessType: read_write
          parameters:
            - name: namespace
              type: string
              description: Kubernetes namespace
              required: true
            - name: name
              type: string
              description: Name for the pod
              required: true
            - name: image
              type: string
              description: Container image to run
              required: true
        - name: namespaces_list
          description: List all namespaces in the cluster
          accessType: read_only
          parameters: []
        - name: events_list
          description: List cluster events in a namespace or across all namespaces
          accessType: read_only
          parameters:
            - name: namespace
              type: string
              description: Kubernetes namespace (omit for all namespaces)
              required: false
        - name: configuration_view
          description: View the current kubeconfig configuration
          accessType: read_only
          parameters: []
      artifacts:
        - uri: oci://quay.io/redhat-user-workloads/crt-nshift-lightspeed-tenant/openshift-mcp-server:latest
          createTimeSinceEpoch: "1775563963000"
          lastUpdateTimeSinceEpoch: "1775563964000"
      runtimeMetadata:
        defaultArgs:
            - --config
            - /etc/mcp-config/config.toml
        defaultPort: 8080
        mcpPath: /mcp
        prerequisites:
            configMaps:
                - description: Optional configuration for MCP server settings
                  keys:
                    - defaultContent: |
                        log_level = 5
                        port = "8080"
                        read_only = true
                        toolsets = ["core", "config"]
                      description: Server configuration file
                      key: config.toml
                      required: false
                  mountAsFile: true
                  mountPath: /etc/mcp-config
                  name: openshift-mcp-server-config
            serviceAccount:
                hint: Needs 'view' ClusterRole for read-only cluster access
                required: true
                suggestedName: mcp-viewer
      securityIndicators:
        readOnlyTools: false
        sast: true
        secureEndpoint: true
        verifiedSource: true
      customProperties:
        architecture:
            metadataType: MetadataStringValue
            string_value: "[\"amd64\",\"arm64\"]"
        containers:
            metadataType: MetadataStringValue
            string_value: ""
        infrastructure:
            metadataType: MetadataStringValue
            string_value: ""
        kubernetes:
            metadataType: MetadataStringValue
            string_value: ""
        openshift:
            metadataType: MetadataStringValue
            string_value: ""
      createTimeSinceEpoch: "1753228800000"
      lastUpdateTimeSinceEpoch: "1775563964000"
    - name: aap-mcp-server
      provider: Red Hat
      license: apache-2.0
      license_link: https://www.apache.org/licenses/LICENSE-2.0
      description: Ansible Automation Platform MCP server providing AI agent access to AAP APIs through OpenAPI specifications. Supports controller, galaxy, gateway, and EDA services with role-based toolsets, session management with token validation, and optional Prometheus metrics. Write operations disabled by default. Tools listed below are a representative subset; the server exposes 62+ tools in read-only mode and 101+ with write operations enabled.
      readme: |-
        # Ansible Automation Platform MCP Server

        **MCP Server Summary:**
        Connect AI agents to your Ansible Automation Platform instance through
        dynamically generated tools derived from AAP OpenAPI specifications.

        ## Services
        - **Controller** — Job templates, workflow jobs, inventories, hosts, groups, projects, organizations
        - **Galaxy** — Collection discovery and version management
        - **Gateway** — User, team, and organization administration, activity streams
        - **EDA** — Event-Driven Ansible activations, rulebooks, decision environments

        ## Features
        - Dynamic tool generation from OpenAPI specs for each AAP service
        - Role-based toolsets for permission-based tool filtering
        - Session management with token validation
        - Prometheus metrics for monitoring (opt-in)
        - Health check endpoint at `/api/v1/health`
        - Write operations controlled via `ALLOW_WRITE_OPERATIONS` (disabled by default)

        ## Prerequisites
        - Running Ansible Automation Platform instance
        - OAuth2 bearer token with appropriate permissions (authentication is per-session via HTTP Authorization header)

        ### Kubernetes/OpenShift Deployment
        - Kubernetes secret `aap-credentials` with `base-url` and `token` keys

        ```bash
        kubectl create secret generic aap-credentials \
          --from-literal=base-url=https://your-aap-instance.example.com \
          --from-literal=token=your-oauth2-bearer-token
        ```
