        ```

        ### Configuration

        Edit `.env` with your model endpoint and container image:

        ```ini
        API_KEY = your-api-key-here
        BASE_URL = https://your-model-endpoint.com/v1
        MODEL_ID = llama-3.1-8b-instruct
