        <div style="text-align: center;">

        A2A (Agent-to-Agent) protocol logo

        # A2A: LangGraph ↔ CrewAI

        *A2A logo from the upstream:* [`A2A project`](https://github.com/a2aproject/A2A/blob/main/docs/assets/a2a-logo-black.svg)

