    - name: RedHatAI/gemma-4-31B-it-FP8-block
      provider: Google
      description: FP8-Block variant of gemma-4-31B-it.
      readme: |
        # gemma-4-31B-it-FP8-block

        ## Model Overview
        - **Model Architecture:** google/gemma-4-31B-it
          - **Input:** Text / Image
          - **Output:** Text
        - **Model Optimizations:**
          - **Weight quantization:** FP8
          - **Activation quantization:** FP8
        - **Release Date:** 2026-04-04
        - **Version:** 1.0
        - **Model Developers:** RedHatAI

        This model is a quantized version of [google/gemma-4-31B-it](https://huggingface.co/google/gemma-4-31B-it).
        It was evaluated on several tasks to assess its quality in comparison to the unquantized model.

        ### Model Optimizations

        This model was obtained by quantizing the weights and activations of [google/gemma-4-31B-it](https://huggingface.co/google/gemma-4-31B-it) to FP8 data type, ready for inference with vLLM.
        This optimization reduces the number of bits per parameter from 16 to 8, reducing the disk size and GPU memory requirements by approximately 50%.

        Only the weights and activations of the linear operators within transformers blocks are quantized using [LLM Compressor](https://github.com/vllm-project/llm-compressor).
        Vision tower, embedding, and output head layers are kept in their original precision.

        ## Deployment

        ### Use with vLLM

        This model can be deployed using [vLLM](https://docs.vllm.ai/en/latest/).
        For detailed instructions including multi-GPU deployment, multimodal inference, thinking mode, function calling, and benchmarking, see the [Gemma 4 vLLM usage guide](https://docs.vllm.ai/projects/recipes/en/latest/Google/Gemma4.html).

        1. Start the vLLM server:
        ```
        vllm serve RedHatAI/gemma-4-31B-it-FP8-block --max-model-len 32768
        ```

        To enable thinking/reasoning and tool calling:
        ```
        vllm serve RedHatAI/gemma-4-31B-it-FP8-block \
          --max-model-len 32768 \
          --reasoning-parser gemma4 \
          --tool-call-parser gemma4 \
          --enable-auto-tool-choice
        ```

        > **Tip:** For text-only workloads, pass `--limit-mm-per-prompt image=0` to skip vision encoder memory allocation. Set `--gpu-memory-utilization 0.90` to maximize KV cache capacity.

        2. Send requests to the server:

        ```python
        from openai import OpenAI

        openai_api_key = "EMPTY"
        openai_api_base = "http://<your-server-host>:8000/v1"

        client = OpenAI(
            api_key=openai_api_key,
            base_url=openai_api_base,
        )

        model = "RedHatAI/gemma-4-31B-it-FP8-block"

        messages = [
            {"role": "user", "content": "Explain quantum mechanics clearly and concisely."},
        ]

        outputs = client.chat.completions.create(
            model=model,
            messages=messages,
        )

        generated_text = outputs.choices[0].message.content
        print(generated_text)
        ```

        ## Creation

        This model was created by applying data-free FP8 block quantization with [LLM Compressor](https://github.com/vllm-project/llm-compressor), as presented in the code snippet below.

        <details>

        ```python
        from llmcompressor import model_free_ptq

        MODEL_ID = "google/gemma-4-31B-it"
        SAVE_DIR = MODEL_ID.split("/")[1] + "-FP8-block"

        model_free_ptq(
            model_stub=MODEL_ID,
            save_directory=SAVE_DIR,
            scheme="FP8_BLOCK",
            ignore=["re:.*vision.*", "lm_head", "re:.*embed_tokens.*"],
            max_workers=8,
            device="cuda:0",
        )
        ```

        </details>

        ## Evaluation

        This model was evaluated on GSM8k-Platinum, MMLU-CoT, MMLU-Pro, and IFEval using [lm-evaluation-harness](https://github.com/EleutherAI/lm-evaluation-harness), served with [vLLM](https://docs.vllm.ai/en/latest/) (OpenAI-compatible API).
        All evaluations were performed with **thinking turned off**.

        ### Accuracy

        <table>
          <thead>
            <tr>
              <th>Category</th>
