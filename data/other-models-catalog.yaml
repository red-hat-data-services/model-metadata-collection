    - name: RedHatAI/gemma-4-31B-it-NVFP4
      provider: Google
      description: NVFP4 variant of gemma-4-31B-it.
      readme: |
        # gemma-4-31B-it-NVFP4

        ## Model Overview
        - **Model Architecture:** google/gemma-4-31B-it
          - **Input:** Text / Image
          - **Output:** Text
        - **Model Optimizations:**
          - **Weight quantization:** FP4
          - **Activation quantization:** FP4
        - **Release Date:** 2026-04-04
        - **Version:** 1.0
        - **Model Developers:** RedHatAI

        This model is a quantized version of [google/gemma-4-31B-it](https://huggingface.co/google/gemma-4-31B-it).
        It was evaluated on several tasks to assess its quality in comparison to the unquantized model.

        ### Model Optimizations

        This model was obtained by quantizing the weights and activations of [google/gemma-4-31B-it](https://huggingface.co/google/gemma-4-31B-it) to FP4 data type, ready for inference with vLLM.
        This optimization reduces the number of bits per parameter from 16 to 4, reducing the disk size and GPU memory requirements by approximately 75%.

        Only the weights and activations of the linear operators within transformers blocks are quantized using [LLM Compressor](https://github.com/vllm-project/llm-compressor).
        Vision tower, embedding, and output head layers are kept in their original precision.

        ## Deployment

        ### Use with vLLM

        This model can be deployed using [vLLM](https://docs.vllm.ai/en/latest/).
        For detailed instructions including multi-GPU deployment, multimodal inference, thinking mode, function calling, and benchmarking, see the [Gemma 4 vLLM usage guide](https://docs.vllm.ai/projects/recipes/en/latest/Google/Gemma4.html).

        1. Start the vLLM server:
        ```
        vllm serve RedHatAI/gemma-4-31B-it-NVFP4 --max-model-len 32768
        ```

        To enable thinking/reasoning and tool calling:
        ```
        vllm serve RedHatAI/gemma-4-31B-it-NVFP4 \
          --max-model-len 32768 \
          --reasoning-parser gemma4 \
          --tool-call-parser gemma4 \
          --enable-auto-tool-choice
        ```

        > **Tip:** For text-only workloads, pass `--limit-mm-per-prompt image=0` to skip vision encoder memory allocation. Set `--gpu-memory-utilization 0.90` to maximize KV cache capacity.

        2. Send requests to the server:

        ```python
        from openai import OpenAI

        openai_api_key = "EMPTY"
        openai_api_base = "http://<your-server-host>:8000/v1"

        client = OpenAI(
            api_key=openai_api_key,
            base_url=openai_api_base,
        )

        model = "RedHatAI/gemma-4-31B-it-NVFP4"

        messages = [
            {"role": "user", "content": "Explain quantum mechanics clearly and concisely."},
        ]

        outputs = client.chat.completions.create(
            model=model,
            messages=messages,
        )

        generated_text = outputs.choices[0].message.content
        print(generated_text)
        ```

        ## Creation

        This model was created by applying [LLM Compressor](https://github.com/vllm-project/llm-compressor) with calibration samples from [The Pile](https://huggingface.co/datasets/mit-han-lab/pile-val-backup), as presented in the code snippet below.

        <details>

        ```python
        from datasets import load_dataset
        from transformers import AutoProcessor, Gemma4ForConditionalGeneration, ProcessorMixin

        from llmcompressor import oneshot
        from llmcompressor.modifiers.quantization import QuantizationModifier

        MODEL_ID = "google/gemma-4-31B-it"

        model = Gemma4ForConditionalGeneration.from_pretrained(MODEL_ID, dtype="auto")
        processor = AutoProcessor.from_pretrained(MODEL_ID, trust_remote_code=True)

        NUM_CALIBRATION_SAMPLES = 32
        MAX_SEQUENCE_LENGTH = 2048

        DATASET_ID = "mit-han-lab/pile-val-backup"
        DATASET_SPLIT = "validation"

        recipe = [
            QuantizationModifier(
                targets="Linear",
                scheme="NVFP4",
                ignore=["re:.*vision.*", "re:.*audio.*", "lm_head", "re:.*embed.*"],
            ),
        ]


        def get_calib_dataset(processor: ProcessorMixin):
            ds = load_dataset(
                DATASET_ID,
                split=f"{DATASET_SPLIT}[:{NUM_CALIBRATION_SAMPLES * 10}]",
            )

            def preprocess(example):
                return {
                    "input_ids": processor.tokenizer.encode(example["text"].strip())[
                        :MAX_SEQUENCE_LENGTH
                    ]
                }

            ds = (
                ds.shuffle(seed=42)
                .map(preprocess, remove_columns=ds.column_names)
                .filter(lambda example: len(example["input_ids"]) >= MAX_SEQUENCE_LENGTH)
                .select(range(NUM_CALIBRATION_SAMPLES))
            )

            return ds


        oneshot(
            model=model,
            processor=processor,
            dataset=get_calib_dataset(processor),
            recipe=recipe,
            batch_size=1,
            shuffle_calibration_samples=False,
            max_seq_length=MAX_SEQUENCE_LENGTH,
            num_calibration_samples=NUM_CALIBRATION_SAMPLES,
        )

        SAVE_DIR = MODEL_ID.rstrip("/").split("/")[-1] + "-NVFP4"
        model.save_pretrained(SAVE_DIR, save_compressed=True)
        processor.save_pretrained(SAVE_DIR)
        ```

        </details>

        ## Evaluation

        This model was evaluated on GSM8k-Platinum, MMLU-CoT, MMLU-Pro, and IFEval using [lm-evaluation-harness](https://github.com/EleutherAI/lm-evaluation-harness), served with [vLLM](https://docs.vllm.ai/en/latest/) (OpenAI-compatible API).
        All evaluations were performed with **thinking turned off**.

